<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumea — Order History</title>
    <meta name="description" content="View your Lumea order history.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="landing.css?v=2">
    <link rel="stylesheet" href="hub.css?v=2">
    <link rel="stylesheet" href="auth.css?v=2">
    <style>
        .order-card {
            background-color: white;
            border-radius: var(--radius-md);
            border: 1px solid var(--color-border);
            padding: 28px;
            margin-bottom: 22px;
            box-shadow: var(--shadow-xs);
            display: flex;
            flex-direction: column;
            gap: 18px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .order-card:hover {
            box-shadow: var(--shadow-md);
            border-color: var(--color-border-light);
            transform: translateY(-2px);
        }

        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            border-bottom: 1px solid var(--color-border-light);
            padding-bottom: 18px;
        }

        .order-id {
            font-size: 1.05rem;
            font-weight: 700;
            color: var(--color-text-main);
            margin-bottom: 4px;
            letter-spacing: 0.3px;
        }

        .order-date {
            font-size: 0.83rem;
            color: var(--color-text-light);
        }

        .order-status {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.78rem;
            font-weight: 600;
            letter-spacing: 0.2px;
        }

        .status-delivered {
            background-color: #E8F5E9;
            color: #2E7D32;
        }

        .status-delivered::before {
            content: '✓';
            font-size: 0.7rem;
        }

        .status-processing {
            background-color: #FFF3E0;
            color: #E65100;
        }

        .status-processing::before {
            content: '◷';
            font-size: 0.8rem;
        }

        .order-items {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .order-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 6px 0;
        }

        .item-details {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .item-placeholder {
            width: 54px;
            height: 54px;
            border-radius: var(--radius-sm);
            object-fit: cover;
            background-color: var(--color-background-alt);
            border: 1px solid var(--color-border-light);
        }

        .item-name {
            font-size: 0.93rem;
            font-weight: 600;
            color: var(--color-text-main);
        }

        .item-qty {
            font-size: 0.82rem;
            color: var(--color-text-muted);
            margin-top: 2px;
        }

        .item-price {
            font-weight: 700;
            color: var(--color-text-main);
            font-size: 0.95rem;
        }

        .order-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid var(--color-border-light);
            padding-top: 18px;
            margin-top: 4px;
        }

        .order-total {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--color-primary);
        }

        .btn-reorder {
            padding: 9px 20px;
            border: 1.5px solid var(--color-primary);
            background: transparent;
            color: var(--color-primary);
            border-radius: var(--radius-sm);
            font-weight: 600;
            font-size: 0.84rem;
            font-family: var(--font-body);
            cursor: pointer;
            transition: var(--transition);
        }

        .btn-reorder:hover {
            background: linear-gradient(135deg, var(--color-primary), var(--color-primary-hover));
            color: white;
            border-color: var(--color-primary);
            transform: translateY(-1px);
            box-shadow: 0 4px 14px rgba(92, 140, 110, 0.25);
        }

        .empty-orders {
            text-align: center;
            padding: 80px 24px;
            background: white;
            border-radius: var(--radius-md);
            border: 2px dashed var(--color-border);
            position: relative;
            overflow: hidden;
        }

        .empty-orders::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 50% 30%, var(--color-primary-light) 0%, transparent 60%);
            opacity: 0.5;
            pointer-events: none;
        }
    </style>
</head>

<body class="hub-page">
    <!-- Announcement Bar -->
    <div class="announcement-bar">Free shipping on orders over ₱50 | <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="11" width="18" height="10" rx="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg> Secure Checkout</div>

    <!-- Header -->
    <header class="header">
        <div class="header-top">
            <a href="landing.html?v=3" class="logo-container">
                <img src="lumea logo.png" alt="Lumea" class="logo-image">
            </a>
            <div class="search-container">
                <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <div class="search-wrapper">
                    <input type="text" placeholder="Search products…" class="search-input" id="global-search-input">
                    <div class="search-suggestions-dropdown" id="search-suggestions-dropdown"></div>
                </div>
            </div>
            <div class="header-actions">
                <button class="icon-btn" id="nav-profile-btn" aria-label="User Profile">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                </button>
                <button class="icon-btn" id="nav-wishlist-btn" aria-label="Wishlist">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path
                            d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z">
                        </path>
                    </svg>
                </button>
                <button class="icon-btn" id="nav-cart-btn" aria-label="Cart">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <circle cx="9" cy="21" r="1"></circle>
                        <circle cx="20" cy="21" r="1"></circle>
                        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                    </svg>
                </button>
            </div>
        </div>
        <nav class="header-bottom">
            <ul class="nav-links">
                <li><a href="landing.html?v=3">Home</a></li>
                <li><a href="shop.html?v=3">All Products</a></li>
                <li><a href="shop.html?category=face&v=3">Face</a></li>
                <li><a href="shop.html?category=eyes&v=3">Eyes</a></li>
                <li><a href="shop.html?category=lips&v=3">Lips</a></li>
                <li><a href="help.html?v=3">Help</a></li>
            </ul>
        </nav>
    </header>

    <!-- Hub Body -->
    <div class="hub-body">
        <!-- Sidebar -->
        <aside class="hub-sidebar">
            <nav class="hub-nav">
                <a href="profile.html?v=3" class="hub-nav-item">
                    <span class="hub-nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg></span> Profile
                </a>
                <a href="orders.html?v=3" class="hub-nav-item active">
                    <span class="hub-nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"></path><path d="m3.3 7 8.7 5 8.7-5"></path><path d="M12 22V12"></path></svg></span> Order History
                </a>
                <a href="wishlist.html?v=3" class="hub-nav-item">
                    <span class="hub-nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg></span> Wishlist
                </a>
                <a href="cart.html?v=3" class="hub-nav-item">
                    <span class="hub-nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg></span> Cart
                </a>
                <a href="help.html?v=3" class="hub-nav-item">
                    <span class="hub-nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.5 8.5 0 0 1-8.5 8.5A8.4 8.4 0 0 1 6 17l-4 1 1-4a8.4 8.4 0 0 1-1-4.5A8.5 8.5 0 0 1 10.5 1h1A8.5 8.5 0 0 1 21 10v1.5Z"></path></svg></span> Help & Contact
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="hub-content">
            <h1 class="hub-page-title">Order History</h1>
            <p style="color:var(--color-text-light); margin-bottom:24px; font-size: 0.95rem;">View and manage your past
                orders and their status.</p>

            <div id="orders-container">
                <!-- Populated by JS below -->
            </div>

        </main>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-container">
            <div class="footer-bottom">
                <p>&copy; 2026 Lumea. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="db-config.js"></script>
    <script src="db.js"></script>
    <script src="data.js?v=3"></script>
    <script src="auth.js"></script>
    <script src="store.js"></script>
    <script src="search.js"></script>
    <script src="nav.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('orders-container');
            const orders = JSON.parse(localStorage.getItem('lumea_orders') || '[]');

            if (orders.length === 0) {
                container.innerHTML = `
                    <div class="empty-orders">
                        <div style="font-size:3.5rem; margin-bottom:16px;"><svg viewBox="0 0 24 24" width="56" height="56" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 7h12l1 13H5L6 7Z"></path><path d="M9 7a3 3 0 0 1 6 0"></path></svg></div>
                        <h3 style="font-family:var(--font-heading); font-size:1.5rem; margin-bottom:10px;">No Orders Yet</h3>
                        <p style="color:var(--color-text-light); margin-bottom:28px; max-width:320px; margin-left:auto; margin-right:auto; line-height:1.5;">Looks like you haven't placed any orders yet. Start browsing our collection!</p>
                        <a href="shop.html?v=3" class="btn-save" style="display:inline-block;text-decoration:none;padding:14px 32px;">Start Shopping</a>
                    </div>`;
                return;
            }

            orders.forEach(order => {
                const statusClass = order.status === 'Delivered' ? 'status-delivered' : 'status-processing';

                const itemsHtml = order.items.map(item => `
                    <div class="order-item">
                        <div class="item-details">
                            <img src="${item.imgUrl || ''}" alt="${item.name}" class="item-placeholder"
                                onerror="this.style.background='#f8f8f8'; this.removeAttribute('src');">
                            <div>
                                <div class="item-name">${item.name}</div>
                                <div class="item-qty">Qty: ${item.qty}</div>
                            </div>
                        </div>
                        <div class="item-price">₱${(item.price * item.qty).toFixed(2)}</div>
                    </div>`).join('');

                const card = `
                    <div class="order-card">
                        <div class="order-header">
                            <div>
                                <div class="order-id">${order.id}</div>
                                <div class="order-date">Placed on ${order.date}</div>
                            </div>
                            <div class="order-status ${statusClass}">${order.status}</div>
                        </div>
                        <div class="order-items">${itemsHtml}</div>
                        <div class="order-footer">
                            <div class="order-total">Total: ₱${order.total.toFixed(2)}</div>
                            <button class="btn-reorder" onclick="window.location.href='shop.html?v=3'">Shop Again</button>
                        </div>
                    </div>`;
                container.insertAdjacentHTML('beforeend', card);
            });
        });
    </script>
</body>

</html>
