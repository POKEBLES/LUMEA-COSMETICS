<body class="admin-body">

    <!-- Sidebar -->

                Overview

            <a href="admin-products.html?v=3" class="admin-nav-item">

                    <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"></path>
                    <line x1="3" y1="6" x2="21" y2="6"></line>

            <a href="admin-orders.html?v=3" class="admin-nav-item">

                    <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"></path>
                    <polyline points="14 2 14 8 20 8"></polyline>

            <a href="admin-users.html?v=3" class="admin-nav-item active">

                    <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"></path>
                    <circle cx="9" cy="7" r="4"></circle>
                    <path d="M23 21v-2a4 4 0 00-3-3.87"></path>
                    <path d="M16 3.13a4 4 0 010 7.75"></path>
                </svg>
                Users
            </a>

            <hr class="admin-nav-divider">
            <div class="admin-nav-label">Account</div>
            <a href="profile.html?v=3" class="admin-nav-item">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>

                My Profile

            <a href="help.html?v=3" class="admin-nav-item">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"></circle>

        </nav>

    <!-- Main -->
    <div class="admin-main">
        <!-- Toast -->
        <div id="admin-toast"
            style="position:fixed;bottom:24px;right:24px;background:#1a1a1a;color:#fff;padding:12px 24px;border-radius:8px;font-size:0.9rem;font-weight:500;z-index:9999;opacity:0;transform:translateY(12px);transition:all 0.3s cubic-bezier(0.4,0,0.2,1);pointer-events:none;box-shadow:0 10px 30px rgba(0,0,0,0.15);">
        </div>

        <div class="admin-topbar">
            <div class="admin-topbar-title">Users</div>
            <div class="admin-topbar-right">
                <a href="profile.html?v=3" class="admin-back-btn">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="15 18 9 12 15 6"></polyline>
                    </svg>
                    Back to Profile
                </a>

            </div>
        </div>

        <div class="admin-content">
            <!-- Summary bar -->
            <div style="display:flex;gap:16px;margin-bottom:24px;flex-wrap:wrap;">
                <div class="stat-card" style="flex:1;min-width:150px;">
                    <div class="stat-value" id="count-total">—</div>
                    <div class="stat-label">Total Users</div>
                </div>
                <div class="stat-card" style="flex:1;min-width:150px;">
                    <div class="stat-value" id="count-customers">—</div>
                    <div class="stat-label">Customers</div>
                </div>
                <div class="stat-card" style="flex:1;min-width:150px;">
                    <div class="stat-value" id="count-admins">—</div>
                    <div class="stat-label">Admins</div>
                </div>
            </div>

            <div class="admin-card">
                <!-- Toolbar -->
                <div class="admin-toolbar">
                    <div class="admin-search">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <circle cx="11" cy="11" r="8"></circle>
                            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                        </svg>
                        <input type="text" id="user-search" placeholder="Search by name or email…"
                            oninput="filterUsers()">
                    </div>
                    <select class="admin-filter-select" id="role-filter" onchange="filterUsers()">
                        <option value="">All Roles</option>
                        <option value="customer">Customer</option>
                        <option value="admin">Admin</option>
                    </select>
                    <button class="btn-admin-primary" onclick="loadUsers()" style="white-space:nowrap;">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2.5">
                            <polyline points="23 4 23 10 17 10"></polyline>
                            <polyline points="1 20 1 14 7 14"></polyline>
                            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
                        </svg>
                        Refresh
                    </button>
                </div>

                <div class="admin-table-wrap">
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Role</th>
                                <th>Phone</th>
                                <th>Registered</th>
                                <th style="text-align:right;">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="users-tbody">
                            <tr>
                                <td colspan="5" style="text-align:center;color:#bbb;padding:40px;">Loading…</td>
                            </tr>
                        </tbody>
                    </table>
                </div>


            </div>
        </div>
    </div>

    <script src="db-config.js"></script>
    <script src="db.js"></script>
    <script src="data.js?v=3"></script>
    <script src="auth.js"></script>
    <script>
        let allUsers = [];



        // ── Load users ───────────────────────────────────────────────────────
        async function loadUsers() {
            const tbody = document.getElementById('users-tbody');
            tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:#bbb;padding:32px;">Loading…</td></tr>';

            // Try Supabase first
            if (window.lumeaDB && window.lumeaDB.isReady()) {
                try {
                    allUsers = await window.lumeaDB.fetchUsers();
                    renderUsers(allUsers);
                    updateCounts(allUsers);
                    return;
                } catch (err) {
                    console.warn('Supabase fetchUsers failed, falling back to localStorage:', err.message);
                }
            }

            // Fallback: localStorage
            const raw = JSON.parse(localStorage.getItem('lumea_users') || '[]');
            allUsers = raw.map((u, index) => ({
                id: u.id || `local-${index}`,
                email: u.email || '',
                firstName: u.firstName || '',
                lastName: u.lastName || '',
                phone: u.phone || '',
                street: u.street || (u.address && u.address.street) || '',
                city: u.city || (u.address && u.address.city) || '',
                postalCode: u.postalCode || (u.address && u.address.postalCode) || '',
                accountType: u.accountType || 'customer',
                createdAt: u.createdAt || ''
            }));
            renderUsers(allUsers);
            updateCounts(allUsers);
        }

        function updateCounts(users) {
            document.getElementById('count-total').textContent = users.length;
            document.getElementById('count-customers').textContent = users.filter(u => u.accountType !== 'admin').length;
            document.getElementById('count-admins').textContent = users.filter(u => u.accountType === 'admin').length;
        }

        function filterUsers() {
            const search = document.getElementById('user-search').value.toLowerCase();
            const role = document.getElementById('role-filter').value;
            const filtered = allUsers.filter(u => {
                const name = (u.firstName + ' ' + u.lastName).toLowerCase();
                const matchSearch = !search || name.includes(search) || u.email.toLowerCase().includes(search);
                const matchRole = !role || u.accountType === role;
                return matchSearch && matchRole;
            });
            renderUsers(filtered);
        }

        function roleBadge(type) {
            const isAdmin = type === 'admin';
            return `<span class="badge ${isAdmin ? 'badge-in-stock' : ''}" style="
                background:${isAdmin ? 'linear-gradient(135deg,#6b4fa0,#a07dcc)' : '#f5f3f0'};
                color:${isAdmin ? '#fff' : '#888'};
                border:${isAdmin ? 'none' : '1px solid #e0dbd5'};
                font-size:0.75rem;font-weight:600;padding:4px 10px;border-radius:20px;
            ">${isAdmin ? 'Admin' : 'Customer'}</span>`;
        }

        function formatDate(iso) {
            if (!iso) return '—';
            try {
                return new Date(iso).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
            } catch { return iso; }
        }

        function renderUsers(users) {
            const tbody = document.getElementById('users-tbody');
            if (users.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:#bbb;padding:40px;">No users found.</td></tr>';
                return;
            }
            tbody.innerHTML = users.map(u => `
                <tr>
                    <td>
                        <div style="display:flex;align-items:center;gap:12px;">
                            <div style="
                                width:36px;height:36px;border-radius:50%;
                                background:linear-gradient(135deg,#c8a887,#a07060);
                                display:flex;align-items:center;justify-content:center;
                                color:#fff;font-weight:700;font-size:0.9rem;flex-shrink:0;
                            ">${(u.firstName || u.email || '?')[0].toUpperCase()}</div>
                            <div>
                                <div style="font-weight:600;color:#2a2a2a;">${u.firstName} ${u.lastName}</div>
                            </div>
                        </div>
                    </td>
                    <td style="color:#666;">${u.email}</td>
                    <td>${roleBadge(u.accountType)}</td>
                    <td style="color:#888;">${u.phone || '—'}</td>
                    <td style="color:#aaa;font-size:0.85rem;">${formatDate(u.createdAt)}</td>
                    <td style="text-align:right;">
                        <button class="btn-icon" onclick="viewUser('${u.id}')" title="View" style="background:none;border:none;cursor:pointer;color:#888;padding:4px;"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg></button>
                        <button class="btn-icon" onclick="editUser('${u.id}')" title="Edit" style="background:none;border:none;cursor:pointer;color:#888;padding:4px;"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg></button>
                        <button class="btn-icon danger" onclick="deleteUser('${u.id}')" title="Delete" style="background:none;border:none;cursor:pointer;color:#b44343;padding:4px;"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg></button>
                    </td>
                </tr>
            `).join('');
        }

        // ── Customer Management Actions ──────────────────────────────────────

        function showToast(msg, isError = false) {
            const t = document.getElementById('admin-toast');
            if (!t) return;
            t.textContent = msg;
            t.style.background = isError ? '#b44343' : '#1a1a1a';
            t.style.opacity = '1';
            t.style.transform = 'translateY(0)';
            clearTimeout(t._timer);
            t._timer = setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translateY(12px)'; }, 3000);
        }

        function viewUser(id) {
            const u = allUsers.find(x => String(x.id) === String(id));
            if (!u) return;

            const addressHtml = (u.street || u.city || u.postalCode)
                ? `${u.street || ''}<br>${u.city || ''} ${u.postalCode || ''}`
                : '<span style="color:#bbb;">No address provided</span>';

            document.getElementById('view-modal-body').innerHTML = `
                <div style="display:flex;align-items:center;gap:16px;margin-bottom:24px;border-bottom:1px solid #eee;padding-bottom:20px;">
                    <div style="width:50px;height:50px;border-radius:50%;background:linear-gradient(135deg,#c8a887,#a07060);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:1.2rem;">${(u.firstName || u.email || '?')[0].toUpperCase()}</div>
                    <div>
                        <div style="font-size:1.1rem;font-weight:600;color:#1a1a1a;">${u.firstName} ${u.lastName}</div>
                        <div style="color:#888;font-size:0.9rem;">${u.email}</div>
                    </div>
                </div>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px;">
                    <div><div style="font-size:0.75rem;color:#999;font-weight:600;margin-bottom:4px;letter-spacing:0.04em;text-transform:uppercase;">Role</div><div>${roleBadge(u.accountType)}</div></div>
                    <div><div style="font-size:0.75rem;color:#999;font-weight:600;margin-bottom:4px;letter-spacing:0.04em;text-transform:uppercase;">Phone</div><div style="font-weight:500;">${u.phone || '—'}</div></div>
                    <div><div style="font-size:0.75rem;color:#999;font-weight:600;margin-bottom:4px;letter-spacing:0.04em;text-transform:uppercase;">Registered Date</div><div style="font-weight:500;">${formatDate(u.createdAt)}</div></div>
                </div>
                <div>
                    <div style="font-size:0.75rem;color:#999;font-weight:600;margin-bottom:6px;letter-spacing:0.04em;text-transform:uppercase;">Shipping Address</div>
                    <div style="background:#f9f8f6;padding:12px;border-radius:8px;font-size:0.9rem;color:#444;line-height:1.5;">${addressHtml}</div>
                </div>
            `;
            document.getElementById('view-modal').classList.add('open');
        }

        function closeViewModal() { document.getElementById('view-modal').classList.remove('open'); }
        function closeEditModal() { document.getElementById('edit-modal').classList.remove('open'); }

        function editUser(id) {
            const u = allUsers.find(x => String(x.id) === String(id));
            if (!u) return;
            document.getElementById('edit-user-id').value = u.id;
            document.getElementById('u-first').value = u.firstName || '';
            document.getElementById('u-last').value = u.lastName || '';
            document.getElementById('u-phone').value = u.phone || '';
            document.getElementById('u-role').value = u.accountType || 'customer';
            document.getElementById('u-street').value = u.street || '';
            document.getElementById('u-city').value = u.city || '';
            document.getElementById('u-postal').value = u.postalCode || '';
            document.getElementById('edit-modal').classList.add('open');
        }

        async function saveUser() {
            const id = document.getElementById('edit-user-id').value;
            const data = {
                firstName: document.getElementById('u-first').value.trim(),
                lastName: document.getElementById('u-last').value.trim(),
                phone: document.getElementById('u-phone').value.trim(),
                accountType: document.getElementById('u-role').value,
                street: document.getElementById('u-street').value.trim(),
                city: document.getElementById('u-city').value.trim(),
                postalCode: document.getElementById('u-postal').value.trim()
            };

            // Local update fallback
            let localUsers = JSON.parse(localStorage.getItem('lumea_users') || '[]');
            const idx = localUsers.findIndex((x, i) => String(x.id || `local-${i}`) === String(id));
            if (idx !== -1) {
                // Keep the nested address structure if it exists
                if (localUsers[idx].address) {
                    localUsers[idx].address.street = data.street;
                    localUsers[idx].address.city = data.city;
                    localUsers[idx].address.postalCode = data.postalCode;
                } else {
                    localUsers[idx].street = data.street;
                    localUsers[idx].city = data.city;
                    localUsers[idx].postalCode = data.postalCode;
                }

                localUsers[idx].firstName = data.firstName;
                localUsers[idx].lastName = data.lastName;
                localUsers[idx].phone = data.phone;
                localUsers[idx].accountType = data.accountType;

                localStorage.setItem('lumea_users', JSON.stringify(localUsers));
            }

            // Supabase sync
            if (window.lumeaDB && window.lumeaDB.isReady()) {
                try {
                    await window.lumeaDB.updateUser(id, data);
                } catch (err) {
                    showToast('Local save OK, DB sync failed: ' + err.message, true);
                }
            }

            closeEditModal();
            showToast('✓ Customer updated successfully');
            await loadUsers();
            filterUsers();
        }

        async function deleteUser(id) {
            if (!confirm("Are you sure you want to permanently delete this user? This cannot be undone.")) return;

            // Local delete
            let localUsers = JSON.parse(localStorage.getItem('lumea_users') || '[]');
            localUsers = localUsers.filter((x, i) => String(x.id || `local-${i}`) !== String(id));
            localStorage.setItem('lumea_users', JSON.stringify(localUsers));

            // Supabase sync
            if (window.lumeaDB && window.lumeaDB.isReady()) {
                try {
                    await window.lumeaDB.deleteUser(id);
                } catch (err) {
                    showToast('Local delete OK, DB sync failed: ' + err.message, true);
                }
            }

            showToast('✓ Customer deleted completely');
            await loadUsers();
            filterUsers();
        }

        document.addEventListener('DOMContentLoaded', async () => {
            const user = getCurrentUser();
            if (!user || user.accountType !== 'admin') {
                window.location.href = 'landing.html';
                return;
            }
            await loadUsers();
        });
    </script>
    </div> <!-- Finalize .admin-main closure properly -->

    <!-- View Modal -->
    <div class="modal-overlay" id="view-modal">
        <div class="modal-box" style="max-width:450px;">
            <div class="modal-title">Customer Details</div>
            <div id="view-modal-body" style="margin-top:20px;"></div>
            <div class="modal-footer">
                <button class="btn-modal-cancel" onclick="closeViewModal()">Close</button>
            </div>
        </div>
    </div>

    <!-- Edit Modal -->
    <div class="modal-overlay" id="edit-modal">
        <div class="modal-box" style="max-width:500px;">
            <div class="modal-title">Edit Customer</div>
            <div style="margin-top:20px;">
                <input type="hidden" id="edit-user-id">
                <div style="display:flex;gap:16px;margin-bottom:16px;">
                    <div class="modal-form-group" style="flex:1;">
                        <label>First Name</label>
                        <input type="text" id="u-first">
                    </div>
                    <div class="modal-form-group" style="flex:1;">
                        <label>Last Name</label>
                        <input type="text" id="u-last">
                    </div>
                </div>
                <div style="display:flex;gap:16px;margin-bottom:16px;">
                    <div class="modal-form-group" style="flex:1;">
                        <label>Phone / Number</label>
                        <input type="text" id="u-phone">
                    </div>
                    <div class="modal-form-group" style="flex:1;">
                        <label>Role</label>
                        <select id="u-role">
                            <option value="customer">Customer</option>
                            <option value="admin">Admin</option>
                        </select>
                    </div>
                </div>
                <!-- Address Fields -->
                <div class="modal-form-group">
                    <label>Street Address</label>
                    <input type="text" id="u-street" placeholder="123 Main St">
                </div>
                <div style="display:flex;gap:16px;margin-bottom:24px;">
                    <div class="modal-form-group" style="flex:2;">
                        <label>City</label>
                        <input type="text" id="u-city">
                    </div>
                    <div class="modal-form-group" style="flex:1;">
                        <label>Postal Code</label>
                        <input type="text" id="u-postal">
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-modal-cancel" onclick="closeEditModal()">Cancel</button>
                <button class="btn-admin-primary" onclick="saveUser()">Save Changes</button>
            </div>
        </div>
    </div>

</body>
