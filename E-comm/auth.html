<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumea - Authentication</title>
    <!-- Premium web design requested modern typography -->
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="auth.css?v=2">
</head>

<body>
    <div class="auth-page">
        <!-- Split Screen Card from modern CSS -->
        <div class="auth-card">
            <a href="landing.html?v=3" class="auth-back-link">← Back to Home</a>

            <!-- Left Side Editorial Image -->
            <div class="auth-image-side"></div>

            <!-- Right Side Form -->
            <div class="auth-form-side">
                <a href="landing.html?v=3" class="auth-logo">
                    <img src="lumea logo.png" alt="Lumea" class="auth-logo-image">
                </a>

                <!-- LOGIN PANEL -->
                <div id="login-panel" class="auth-panel active">
                    <h2 class="auth-heading">Welcome Back</h2>
                    <p class="auth-subheading">Please enter your details to sign in.</p>

                    <div id="login-alert" class="auth-alert"></div>

                    <form id="login-form" class="auth-form">
                        <div class="field-group">
                            <label for="login-email">Email</label>
                            <input type="email" id="login-email" placeholder="you@example.com" required>
                        </div>
                        <div class="field-group">
                            <label for="login-password">Password</label>
                            <input type="password" id="login-password" placeholder="••••••••" required>
                        </div>
                        <button type="submit" class="btn-auth">Log In</button>
                    </form>

                    <div class="auth-toggle-text">
                        Don't have an account? <button type="button" class="toggle-btn" onclick="toggleAuthMode()">Sign
                            up</button>
                    </div>
                </div>

                <!-- SIGNUP PANEL -->
                <div id="signup-panel" class="auth-panel">
                    <h2 class="auth-heading">Create Account</h2>
                    <p class="auth-subheading">Join Lumea for exclusive benefits.</p>

                    <div id="signup-alert" class="auth-alert"></div>
                    <div id="signup-success" class="auth-success"></div>

                    <form id="signup-form" class="auth-form">
                        <div class="form-row">
                            <div class="field-group">
                                <label for="signup-firstName">First Name</label>
                                <input type="text" id="signup-firstName" required>
                            </div>
                            <div class="field-group">
                                <label for="signup-lastName">Last Name</label>
                                <input type="text" id="signup-lastName" required>
                            </div>
                        </div>

                        <div class="field-group">
                            <label for="signup-email">Email</label>
                            <input type="email" id="signup-email" required>
                        </div>

                        <div class="field-group">
                            <label for="signup-phone">Phone</label>
                            <input type="tel" id="signup-phone" required>
                        </div>

                        <div class="form-row">
                            <div class="field-group">
                                <label for="signup-password">Password</label>
                                <input type="password" id="signup-password" required>
                            </div>
                            <div class="field-group">
                                <label for="signup-retypePassword">Confirm Password</label>
                                <input type="password" id="signup-retypePassword" required>
                            </div>
                        </div>

                        <div class="field-group">
                            <label for="signup-street">Street Address</label>
                            <input type="text" id="signup-street" required>
                        </div>

                        <div class="form-row">
                            <div class="field-group">
                                <label for="signup-city">City</label>
                                <input type="text" id="signup-city" required>
                            </div>
                            <div class="field-group">
                                <label for="signup-postalCode">Postal Code</label>
                                <input type="text" id="signup-postalCode" required>
                            </div>
                        </div>

                        <div class="field-group select-wrapper">
                            <label for="signup-accountType">Account Type</label>
                            <select id="signup-accountType" required>
                                <option value="customer">Customer</option>
                                <option value="admin">Admin</option>
                            </select>
                        </div>

                        <button type="submit" class="btn-auth">Create Account</button>
                    </form>

                    <div class="auth-toggle-text">
                        Already have an account? <button type="button" class="toggle-btn" onclick="toggleAuthMode()">Log
                            in</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Integration with application business logic -->
    <script src="db-config.js"></script>
    <script src="db.js"></script>
    <script src="auth.js"></script>
    <script>
        // Modal toggling logic
        function toggleAuthMode() {
            document.getElementById('login-panel').classList.toggle('active');
            document.getElementById('signup-panel').classList.toggle('active');

            // Clear any alerts when toggling
            document.getElementById('login-alert').classList.remove('visible');
            document.getElementById('signup-alert').classList.remove('visible');
            document.getElementById('signup-success').classList.remove('visible');
        }

        // Auto-switch to signup if URL params demand it
        if (window.location.search.includes('mode=signup')) {
            toggleAuthMode();
        }

        // Login Submit event
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-password').value;

            const result = await loginUser(email, pass);
            if (result.success) {
                // Redirect admin users to dashboard, customers to landing
                if (result.user.accountType === 'admin') {
                    window.location.href = 'admin-overview.html';
                } else {
                    window.location.href = 'landing.html';
                }
            } else {
                const alertEl = document.getElementById('login-alert');
                alertEl.textContent = result.error;
                alertEl.classList.add('visible');
            }
        });

        // Registration Submit event
        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                firstName: document.getElementById('signup-firstName').value,
                lastName: document.getElementById('signup-lastName').value,
                email: document.getElementById('signup-email').value,
                phone: document.getElementById('signup-phone').value,
                password: document.getElementById('signup-password').value,
                retypePassword: document.getElementById('signup-retypePassword').value,
                street: document.getElementById('signup-street').value,
                city: document.getElementById('signup-city').value,
                postalCode: document.getElementById('signup-postalCode').value,
                accountType: document.getElementById('signup-accountType').value
            };

            const result = await registerUser(data);
            if (result.success) {
                const successEl = document.getElementById('signup-success');
                successEl.textContent = 'Account created successfully! You can now log in.';
                successEl.classList.add('visible');
                document.getElementById('signup-alert').classList.remove('visible');

                // Clear the form and swap back to login panel after a short delay
                document.getElementById('signup-form').reset();
                setTimeout(() => toggleAuthMode(), 2000);
            } else {
                const alertEl = document.getElementById('signup-alert');
                alertEl.textContent = result.error;
                alertEl.classList.add('visible');
                document.getElementById('signup-success').classList.remove('visible');
            }
        });
    </script>
</body>

</html>
